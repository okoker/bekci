name: Deploy website to GitHub Pages

# Publishes the Bekci website to GitHub Pages. The site lives in _website/
# (index.html + assets/) and is served as-is from the artifact.

on:
  push:
    branches: [main]
    paths:
      - '_website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
