services:
  bekci:
    build:
      context: .
      args:
        VERSION: 3.1.1
    container_name: bekci
    ports:
      - "65000:65000"
    volumes:
      - bekci-data:/data
    environment:
      - BEKCI_DB_PATH=/data/bekci.db
    cap_add:
      - NET_RAW
    restart: unless-stopped

volumes:
  bekci-data:
