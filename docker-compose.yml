services:
  bekci:
    build:
      context: .
      args:
        VERSION: 3.3.2
    container_name: bekci
    ports:
      - "65000:65000"
    volumes:
      - bekci-data:/data
    environment:
      - BEKCI_DB_PATH=/data/bekci.db
      - BEKCI_HOST=0.0.0.0
    cap_add:
      - NET_RAW
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped

volumes:
  bekci-data:
